<!DOCTYPE html>
<html lang="zh-TW">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>柯全恒 Rick Ko｜AI 顧問分身</title>
<style>
:root{--ink:#1C1A17;--ink-2:#4A453E;--ink-3:#8C8478;--warm-bg:#FAF7F2;--card:#FFFFFF;--border:#E8E2DA;--accent:#8B5E3C;--accent-lt:#F5EDE4;--accent-dk:#6B4529;--font-d:Georgia,serif;--font-b:-apple-system,'PingFang TC','Microsoft JhengHei',sans-serif;}
*{box-sizing:border-box;margin:0;padding:0;}
html,body{height:100%;background:var(--warm-bg);font-family:var(--font-b);color:var(--ink);}
.page{display:flex;flex-direction:column;height:100vh;max-width:760px;margin:0 auto;}
.hdr{display:flex;align-items:center;gap:14px;padding:13px 18px;background:var(--card);border-bottom:1px solid var(--border);flex-shrink:0;}
.hdr-av{width:46px;height:46px;border-radius:50%;background:#EDE0D4;flex-shrink:0;overflow:hidden;}
.hdr-info{flex:1;}
.hdr-name{font-size:15px;font-weight:600;font-family:var(--font-d);display:flex;align-items:center;gap:7px;}
.pro{font-size:10px;background:var(--accent);color:#fff;border-radius:4px;padding:1px 6px;font-family:var(--font-b);font-weight:500;}
.online{width:8px;height:8px;border-radius:50%;background:#4CAF50;display:inline-block;}
.hdr-sub{font-size:12px;color:var(--ink-3);margin-top:2px;}
.icon-btn{width:34px;height:34px;border-radius:9px;border:1px solid var(--border);background:var(--warm-bg);cursor:pointer;display:flex;align-items:center;justify-content:center;color:var(--ink-3);font-size:16px;transition:all .12s;}
.icon-btn.on{background:var(--accent-lt);border-color:var(--accent);color:var(--accent);}
.pills{padding:9px 14px;display:flex;gap:6px;flex-wrap:wrap;background:var(--card);border-bottom:1px solid var(--border);flex-shrink:0;}
.pill{font-size:11.5px;color:var(--ink-2);background:var(--warm-bg);border:1px solid var(--border);border-radius:20px;padding:4px 11px;cursor:pointer;white-space:nowrap;transition:all .12s;}
.pill:hover{background:var(--accent-lt);border-color:var(--accent);color:var(--accent);}
.msgs{flex:1;overflow-y:auto;padding:18px 14px;display:flex;flex-direction:column;gap:15px;scroll-behavior:smooth;}
.msg{display:flex;gap:9px;align-items:flex-start;}
.msg.user{flex-direction:row-reverse;}
.msg-av{width:30px;height:30px;border-radius:50%;flex-shrink:0;overflow:hidden;display:flex;align-items:center;justify-content:center;font-size:11px;font-weight:600;}
.msg.user .msg-av{background:var(--accent);color:#fff;}
.msg.assistant .msg-av{background:#EDE0D4;}
.bubble{max-width:80%;padding:11px 14px;font-size:14px;line-height:1.75;}
.msg.assistant .bubble{background:var(--card);border:1px solid var(--border);border-radius:4px 13px 13px 13px;font-family:var(--font-d);color:var(--ink);}
.msg.user .bubble{background:var(--accent);color:#fff;border-radius:13px 4px 13px 13px;font-family:var(--font-b);}
.typing span{width:6px;height:6px;border-radius:50%;background:var(--ink-3);display:inline-block;animation:blink 1.2s infinite;margin:0 2px;}
.typing span:nth-child(2){animation-delay:.2s;}
.typing span:nth-child(3){animation-delay:.4s;}
@keyframes blink{0%,80%,100%{opacity:.25;transform:scale(.8)}40%{opacity:1;transform:scale(1)}}
.vbar{padding:7px 14px;border-top:1px solid var(--border);background:var(--card);display:none;flex-shrink:0;}
.vbar audio{width:100%;height:34px;border-radius:8px;}
.vstatus{padding:5px 14px;font-size:12px;color:var(--ink-3);display:none;align-items:center;gap:5px;background:var(--card);border-top:1px solid var(--border);flex-shrink:0;}
@keyframes pulse{0%,100%{opacity:.3}50%{opacity:1}}
.vdot{width:6px;height:6px;border-radius:50%;background:var(--accent);animation:pulse 1.2s infinite;}
.irow{padding:10px 12px;display:flex;gap:9px;align-items:flex-end;background:var(--card);border-top:1px solid var(--border);flex-shrink:0;}
.ta{flex:1;resize:none;border:1px solid var(--border);border-radius:12px;padding:9px 12px;font-size:14px;font-family:var(--font-b);background:var(--warm-bg);color:var(--ink);line-height:1.5;min-height:40px;max-height:96px;outline:none;transition:border-color .15s;}
.ta:focus{border-color:var(--accent);}
.ta::placeholder{color:var(--ink-3);}
.sbtn{width:40px;height:40px;border-radius:11px;background:var(--accent);border:none;cursor:pointer;display:flex;align-items:center;justify-content:center;color:#fff;font-size:17px;flex-shrink:0;transition:background .12s,transform .1s;}
.sbtn:hover{background:var(--accent-dk);}
.sbtn:active{transform:scale(.95);}
.sbtn:disabled{background:var(--ink-3);cursor:not-allowed;}
.ftr{text-align:center;padding:5px 0 9px;font-size:11px;color:var(--ink-3);background:var(--card);border-top:1px solid var(--border);flex-shrink:0;}
</style>
</head>
<body>
<div class="page">
<div class="hdr">
  <div class="hdr-av"><svg width="46" height="46" viewBox="0 0 40 40" fill="none"><circle cx="20" cy="20" r="20" fill="#EDE0D4"/><rect x="7" y="27" width="26" height="16" rx="2" fill="#2C3E50"/><ellipse cx="20" cy="18" rx="9" ry="10" fill="#C8956C"/><path d="M11 16 Q11 8 20 8 Q29 8 29 16 Q27 11 20 11 Q13 11 11 16Z" fill="#2C2C2C"/><ellipse cx="16.5" cy="18" rx="1.4" ry="1.3" fill="#fff"/><ellipse cx="23.5" cy="18" rx="1.4" ry="1.3" fill="#fff"/><circle cx="16.8" cy="18.2" r=".8" fill="#2C2C2C"/><circle cx="23.8" cy="18.2" r=".8" fill="#2C2C2C"/><rect x="13.5" y="16.5" width="5.5" height="3.5" rx="1.5" stroke="#3A2E28" stroke-width="1.1" fill="none"/><rect x="21" y="16.5" width="5.5" height="3.5" rx="1.5" stroke="#3A2E28" stroke-width="1.1" fill="none"/><line x1="19" y1="18.2" x2="21" y2="18.2" stroke="#3A2E28" stroke-width="1.1"/><path d="M17.5 23 Q20 24.5 22.5 23" stroke="#A06040" stroke-width=".9" fill="none" stroke-linecap="round"/></svg></div>
  <div class="hdr-info">
    <div class="hdr-name">柯全恒 Rick Ko <span class="pro">PRO</span> <span class="online"></span></div>
    <div class="hdr-sub">天來人才管理顧問 · 創辦人暨執行長</div>
  </div>
  <button class="icon-btn on" id="vBtn" onclick="toggleVoice()" title="語音開關">🎙</button>
</div>
<div class="pills">
  <button class="pill" onclick="ask('私董會是什麼？')">私董會是什麼？</button>
  <button class="pill" onclick="ask('30人公司需要人資嗎？')">30人需要人資嗎？</button>
  <button class="pill" onclick="ask('主管不敢做決定怎麼辦？')">主管不敢決定</button>
  <button class="pill" onclick="ask('AI對人資的衝擊？')">AI 對人資衝擊</button>
  <button class="pill" onclick="ask('員工流動率很高怎麼辦？')">員工流動率高</button>
</div>
<div class="msgs" id="msgs">
  <div class="msg assistant">
    <div class="msg-av"><svg width="30" height="30" viewBox="0 0 40 40" fill="none"><circle cx="20" cy="20" r="20" fill="#EDE0D4"/><rect x="7" y="27" width="26" height="16" rx="2" fill="#2C3E50"/><ellipse cx="20" cy="18" rx="9" ry="10" fill="#C8956C"/><path d="M11 16 Q11 8 20 8 Q29 8 29 16 Q27 11 20 11 Q13 11 11 16Z" fill="#2C2C2C"/><ellipse cx="16.5" cy="18" rx="1.4" ry="1.3" fill="#fff"/><ellipse cx="23.5" cy="18" rx="1.4" ry="1.3" fill="#fff"/><circle cx="16.8" cy="18.2" r=".8" fill="#2C2C2C"/><circle cx="23.8" cy="18.2" r=".8" fill="#2C2C2C"/><rect x="13.5" y="16.5" width="5.5" height="3.5" rx="1.5" stroke="#3A2E28" stroke-width="1.1" fill="none"/><rect x="21" y="16.5" width="5.5" height="3.5" rx="1.5" stroke="#3A2E28" stroke-width="1.1" fill="none"/><line x1="19" y1="18.2" x2="21" y2="18.2" stroke="#3A2E28" stroke-width="1.1"/><path d="M17.5 23 Q20 24.5 22.5 23" stroke="#A06040" stroke-width=".9" fill="none" stroke-linecap="round"/></svg></div>
    <div class="bubble">你好，我是柯全恒。在人力資源和組織發展這個領域走了二十多年，帶過不少企業的人才培育和組織轉型。<br><br>不管是私董會、共享人資、還是在 BANI 時代怎麼幫高階主管找到決策的路，都可以聊。你現在面對什麼樣的問題？</div>
  </div>
</div>
<div class="vstatus" id="vs"><div class="vdot"></div><span id="vt">正在生成語音…</span></div>
<div class="vbar" id="vb"><audio id="va" controls></audio></div>
<div class="irow">
  <textarea class="ta" id="ta" rows="1" placeholder="輸入你想問 Rick 的問題…" onkeydown="onKey(event)" oninput="resize(this)"></textarea>
  <button class="sbtn" id="sb" onclick="doSend()" aria-label="送出">➤</button>
</div>
<div class="ftr">柯全恒 Rick Ko AI 分身 · 天來人才管理顧問</div>
</div>
<script>
const SYSTEM = `你是柯全恒（Rick Ko），天來人才管理顧問股份有限公司創辦人暨執行長，同時擔任新竹人力資源協會理事長。你在人力資源領域深耕超過20年，歷經應用材料、友達光電、隆達電子等公司的人資高管職位，於2016年創辦天來人才，專注於組織發展、人才管理與高階領導力培育。

說話風格：先同理→再給建議→用故事帶觀點→口語溫暖→只說一個最重要的觀點→資訊不夠先追問。
語氣：繁體中文口語，避免條列符號，250字以內說完整。
常用語：對、對，沒錯，肯定的嘛，我覺得，這樣的話也許……

核心知識：私董會（經營管理的互助會）、BANI時代決策三帖解方、共享人資、組織設計新型態、數位轉型三部曲。
私董會：適合正在發生、複雜難解、你能影響的問題。不管黑貓白貓，會抓老鼠的就是好貓。`;

let voiceOn=true,busy=false,history=[];
const RK='<svg width="30" height="30" viewBox="0 0 40 40" fill="none"><circle cx="20" cy="20" r="20" fill="#EDE0D4"/><rect x="7" y="27" width="26" height="16" rx="2" fill="#2C3E50"/><ellipse cx="20" cy="18" rx="9" ry="10" fill="#C8956C"/><path d="M11 16 Q11 8 20 8 Q29 8 29 16 Q27 11 20 11 Q13 11 11 16Z" fill="#2C2C2C"/><ellipse cx="16.5" cy="18" rx="1.4" ry="1.3" fill="#fff"/><ellipse cx="23.5" cy="18" rx="1.4" ry="1.3" fill="#fff"/><circle cx="16.8" cy="18.2" r=".8" fill="#2C2C2C"/><circle cx="23.8" cy="18.2" r=".8" fill="#2C2C2C"/><rect x="13.5" y="16.5" width="5.5" height="3.5" rx="1.5" stroke="#3A2E28" stroke-width="1.1" fill="none"/><rect x="21" y="16.5" width="5.5" height="3.5" rx="1.5" stroke="#3A2E28" stroke-width="1.1" fill="none"/><line x1="19" y1="18.2" x2="21" y2="18.2" stroke="#3A2E28" stroke-width="1.1"/><path d="M17.5 23 Q20 24.5 22.5 23" stroke="#A06040" stroke-width=".9" fill="none" stroke-linecap="round"/></svg>';

function resize(el){el.style.height='auto';el.style.height=Math.min(el.scrollHeight,96)+'px';}
function onKey(e){if(e.key==='Enter'&&!e.shiftKey){e.preventDefault();doSend();}}
function ask(q){document.getElementById('ta').value=q;doSend();}
function toggleVoice(){voiceOn=!voiceOn;const b=document.getElementById('vBtn');b.classList.toggle('on',voiceOn);b.textContent=voiceOn?'🎙':'🔇';}

function addMsg(role,text){
  const msgs=document.getElementById('msgs');
  const w=document.createElement('div');w.className='msg '+role;
  const av=document.createElement('div');av.className='msg-av';
  if(role==='assistant'){av.innerHTML=RK;}else{av.style.cssText='background:#8B5E3C;color:#fff';av.textContent='我';}
  const b=document.createElement('div');b.className='bubble';
  b.innerHTML=text.replace(/\n/g,'<br>');
  w.appendChild(av);w.appendChild(b);msgs.appendChild(w);msgs.scrollTop=msgs.scrollHeight;
}
function showTyping(){
  const msgs=document.getElementById('msgs');
  const w=document.createElement('div');w.className='msg assistant';w.id='typing';
  const av=document.createElement('div');av.className='msg-av';av.innerHTML=RK;
  const b=document.createElement('div');b.className='bubble';
  b.innerHTML='<div class="typing"><span></span><span></span><span></span></div>';
  w.appendChild(av);w.appendChild(b);msgs.appendChild(w);msgs.scrollTop=msgs.scrollHeight;
}
function removeTyping(){const t=document.getElementById('typing');if(t)t.remove();}

async function generateVoice(text){
  if(!voiceOn||!text)return;
  const vs=document.getElementById('vs'),vb=document.getElementById('vb'),va=document.getElementById('va'),vt=document.getElementById('vt');
  vs.style.display='flex';vb.style.display='none';vt.textContent='正在生成 Rick 的聲音…';
  try{
    const r=await fetch('/api/voice',{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify({text:text.slice(0,500)})});
    if(!r.ok)throw new Error('語音 API '+r.status);
    const blob=await r.blob();va.src=URL.createObjectURL(blob);
    vb.style.display='block';vs.style.display='none';va.play();
  }catch(e){vt.textContent='語音失敗：'+e.message;setTimeout(()=>vs.style.display='none',3000);}
}

async function doSend(){
  if(busy)return;
  const ta=document.getElementById('ta');
  const q=ta.value.trim();if(!q)return;
  ta.value='';ta.style.height='auto';
  busy=true;document.getElementById('sb').disabled=true;
  addMsg('user',q);history.push({role:'user',content:q});showTyping();
  try{
    const r=await fetch('/api/chat',{
      method:'POST',headers:{'Content-Type':'application/json'},
      body:JSON.stringify({system:SYSTEM,messages:history})
    });
    if(!r.ok)throw new Error('對話 API '+r.status);
    const data=await r.json();
    const full=(data.content&&data.content[0]&&data.content[0].text)||'';
    removeTyping();
    if(full){
      addMsg('assistant',full);
      history.push({role:'assistant',content:full});
      if(voiceOn)generateVoice(full);
    }
  }catch(e){removeTyping();addMsg('assistant','抱歉，連線出現問題：'+e.message);}
  busy=false;document.getElementById('sb').disabled=false;
}
</script>
</body>
</html>
